<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Roadmap Designer Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f0ede8;--panel:#fff;--border:#e2dfd8;--text:#1a1a1a;--muted:#888;--accent:#4a6fa5;--font:'Inter',sans-serif;}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOOLBAR ── */
#toolbar{
  display:flex;align-items:center;background:var(--panel);
  border-bottom:1px solid var(--border);flex-shrink:0;height:50px;
}
#tb-scroll{
  display:flex;align-items:center;gap:6px;padding:0 14px;
  overflow-x:scroll;white-space:nowrap;height:100%;flex:1;
  /* visible styled scrollbar */
  scrollbar-width:thin;scrollbar-color:#c8c4bc transparent;
}
#tb-scroll::-webkit-scrollbar{height:5px;}
#tb-scroll::-webkit-scrollbar-track{background:transparent;}
#tb-scroll::-webkit-scrollbar-thumb{background:#c8c4bc;border-radius:4px;}
#tb-scroll::-webkit-scrollbar-thumb:hover{background:#aaa8a0;}
.tb-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-right:6px;flex-shrink:0;}
.sep{width:1px;height:28px;background:var(--border);margin:0 6px;flex-shrink:0;}
.tb-group{display:inline-flex;align-items:center;gap:5px;flex-shrink:0;}
.tb-lbl{font-size:10px;color:var(--muted);white-space:nowrap;}
.tb-btn{font-size:11px;font-family:var(--font);padding:4px 10px;border:1px solid var(--border);border-radius:6px;background:transparent;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500;}
.tb-btn:hover{background:#f4f1ec;border-color:#bbb;}
.tb-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
input[type=color]{width:26px;height:26px;border:1px solid var(--border);border-radius:5px;cursor:pointer;padding:2px;flex-shrink:0;}
.rw{display:inline-flex;align-items:center;gap:4px;}
.rw input[type=range]{width:72px;cursor:pointer;accent-color:var(--accent);}
.rv{font-size:10px;color:var(--muted);min-width:24px;text-align:right;}
select{font-size:11px;font-family:var(--font);padding:4px 7px;border:1px solid var(--border);border-radius:6px;background:var(--panel);cursor:pointer;}

/* ── CANVAS ── */
#canvas-wrap{flex:1;position:relative;overflow:hidden;}
#canvas-wrap svg{position:absolute;top:0;left:0;width:100%;height:100%;}

/* ── CARDS ── */
.sc{position:absolute;background:#fff;border:1.5px solid #ccc;border-radius:10px;padding:10px 14px;min-width:160px;max-width:260px;cursor:grab;user-select:none;box-shadow:0 2px 10px rgba(0,0,0,.08);transition:box-shadow .15s;}
.sc:hover{box-shadow:0 4px 18px rgba(0,0,0,.14);}
.sc.dragging{cursor:grabbing;box-shadow:0 10px 32px rgba(0,0,0,.2);z-index:999;}
.sc-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;color:#fff;margin-bottom:6px;}
.sc-title{font-size:13px;font-weight:600;line-height:1.3;word-break:break-word;}
.sc-sub{font-size:11px;margin-top:3px;line-height:1.4;word-break:break-word;opacity:.75;white-space:pre-line;}
.sc-edit{position:absolute;top:7px;right:8px;font-size:12px;background:none;border:none;cursor:pointer;opacity:0;transition:opacity .15s;color:#555;padding:2px;}
.sc:hover .sc-edit{opacity:1;}

/* ── EDIT PANEL ── */
#ep{position:absolute;right:0;top:0;bottom:0;width:290px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);z-index:300;padding:20px 18px;}
#ep.open{transform:translateX(0);}
#ep h2{font-size:14px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
#ep h2 button{background:none;border:none;cursor:pointer;font-size:16px;color:var(--muted);}
.ep-sec h3{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px;font-weight:600;}
.ep-sec{margin-bottom:18px;}
.ep-f{margin-bottom:8px;}
.ep-f label{font-size:12px;display:block;margin-bottom:3px;color:var(--muted);}
.ep-f input[type=text],.ep-f textarea{width:100%;border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:12px;font-family:var(--font);outline:none;resize:vertical;}
.ep-f input:focus,.ep-f textarea:focus{border-color:var(--accent);}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.ci{display:flex;align-items:center;gap:6px;font-size:12px;}
.ci input[type=color]{width:28px;height:28px;}
.rep{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.rep label{font-size:12px;min-width:78px;}
.rep input[type=range]{flex:1;accent-color:var(--accent);}
.rep span{font-size:11px;color:var(--muted);min-width:24px;text-align:right;}
.ep-btn{width:100%;padding:9px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-size:13px;font-family:var(--font);font-weight:500;margin-bottom:6px;background:transparent;}
.ep-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.ep-btn.primary:hover{opacity:.88;}
.ep-btn.del{color:#c0392b;border-color:#e57373;}
.ep-btn.del:hover{background:#fdecea;}

/* ── ADD BTN ── */
#add-btn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border:none;border-radius:24px;padding:10px 22px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;box-shadow:0 4px 18px rgba(74,111,165,.35);transition:all .2s;z-index:200;}
#add-btn:hover{transform:translateX(-50%) translateY(-2px);}

/* ── SAVE INDICATOR ── */
#save-dot{position:absolute;bottom:22px;right:20px;font-size:11px;color:var(--muted);z-index:200;transition:opacity .3s;}
</style>
</head>
<body>

<div id="toolbar">
<div id="tb-scroll">
  <span class="tb-title">Roadmap Designer</span>
  <div class="sep"></div>

  <div class="tb-group"><span class="tb-lbl">Road</span>
    <input type="color" id="c-road" value="#1e1e1e" title="Road color" oninput="setRoadColor(this.value)"/>
    <input type="color" id="c-dash" value="#f0a500" title="Dash color" oninput="setDashColor(this.value)"/>
  </div><div class="sep"></div>

  <div class="tb-group"><span class="tb-lbl">Width</span>
    <div class="rw"><input type="range" min="18" max="72" value="38" oninput="setRoadWidth(+this.value);rw_v.textContent=this.value"/><span class="rv" id="rw_v">38</span></div>
  </div>
  <div class="tb-group"><span class="tb-lbl">Curviness</span>
    <div class="rw"><input type="range" min="0" max="100" value="55" oninput="setCurviness(+this.value);cv_v.textContent=this.value"/><span class="rv" id="cv_v">55</span></div>
  </div>
  <div class="tb-group"><span class="tb-lbl">Amplitude</span>
    <div class="rw"><input type="range" min="10" max="160" value="80" oninput="setAmplitude(+this.value);am_v.textContent=this.value"/><span class="rv" id="am_v">80</span></div>
  </div>
  <div class="tb-group"><span class="tb-lbl">Frequency</span>
    <div class="rw"><input type="range" min="0.5" max="12" step="0.5" value="3" oninput="setFrequency(+this.value);fq_v.textContent=this.value"/><span class="rv" id="fq_v">3</span></div>
  </div>
  <div class="tb-group"><span class="tb-lbl">Dash len</span>
    <div class="rw"><input type="range" min="4" max="40" value="16" oninput="setDashLen(+this.value);dl_v.textContent=this.value"/><span class="rv" id="dl_v">16</span></div>
  </div>
  <div class="tb-group"><span class="tb-lbl">Dash gap</span>
    <div class="rw"><input type="range" min="2" max="40" value="12" oninput="setDashGap(+this.value);dg_v.textContent=this.value"/><span class="rv" id="dg_v">12</span></div>
  </div>
  <div class="tb-group"><span class="tb-lbl">Dot size</span>
    <div class="rw"><input type="range" min="6" max="22" value="13" oninput="setDotSize(+this.value);ds_v.textContent=this.value"/><span class="rv" id="ds_v">13</span></div>
  </div><div class="sep"></div>

  <div class="tb-group"><span class="tb-lbl">Card radius</span>
    <div class="rw"><input type="range" min="0" max="28" value="10" oninput="setCardRadius(+this.value);cr_v.textContent=this.value"/><span class="rv" id="cr_v">10</span></div>
  </div>
  <div class="tb-group"><span class="tb-lbl">Shadow</span>
    <button class="tb-btn" id="btn-shadow" onclick="toggleShadow(this)">Off</button>
  </div>
  <div class="tb-group"><span class="tb-lbl">Font</span>
    <select id="ctrl-font" onchange="setGlobalFont(this.value)">
      <option value="'Inter',sans-serif">Inter</option>
      <option value="Georgia,serif">Georgia</option>
      <option value="'Playfair Display',serif">Playfair</option>
      <option value="'Trebuchet MS',sans-serif">Trebuchet</option>
      <option value="'Courier New',monospace">Courier</option>
    </select>
  </div><div class="sep"></div>

  <div class="tb-group"><span class="tb-lbl">Canvas BG</span>
    <input type="color" id="c-bg" value="#f0ede8" oninput="setBg(this.value)"/>
  </div><div class="sep"></div>

  <div class="tb-group">
    <button class="tb-btn" onclick="exportPNG()">Export PNG</button>
    <button class="tb-btn" onclick="exportSVGFile()">Export SVG</button>
    <button class="tb-btn del" onclick="clearAll()">Reset</button>
  </div>
</div>
</div>

<div id="canvas-wrap">
  <svg id="rsvg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="dshadow" x="-30%" y="-30%" width="160%" height="160%">
        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000015"/>
      </filter>
    </defs>
    <rect id="bg-rect" x="0" y="0" width="100%" height="100%" fill="#f0ede8"/>
    <path id="road-fill" fill="none" stroke="#1e1e1e" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <path id="road-dash" fill="none" stroke="#f0a500" stroke-width="2.5" stroke-dasharray="16 12" stroke-linecap="round"/>
    <g id="g-connectors"></g>
    <g id="g-dots"></g>
  </svg>
  <div id="cards-layer"></div>
  <button id="add-btn" onclick="addStation()">＋ Add Station</button>
  <div id="save-dot">✓ Saved</div>
</div>

<div id="ep">
  <h2><span id="ep-head">Edit Station</span><button onclick="closePanel()">✕</button></h2>
  <div class="ep-sec">
    <h3>Content</h3>
    <div class="ep-f"><label>Title</label><input type="text" id="ep-title" placeholder="Station title" oninput="liveUpdate()"/></div>
    <div class="ep-f"><label>Description</label><textarea id="ep-sub" rows="3" placeholder="Supporting text..." oninput="liveUpdate()"></textarea></div>
  </div>
  <div class="ep-sec">
    <h3>Appearance</h3>
    <div class="cgrid">
      <div class="ci"><input type="color" id="ep-fill" oninput="liveStyle()"/><span>Fill</span></div>
      <div class="ci"><input type="color" id="ep-border" oninput="liveStyle()"/><span>Border</span></div>
      <div class="ci"><input type="color" id="ep-tc" oninput="liveStyle()"/><span>Title</span></div>
      <div class="ci"><input type="color" id="ep-sc" oninput="liveStyle()"/><span>Text</span></div>
      <div class="ci"><input type="color" id="ep-dc" oninput="liveStyle()"/><span>Dot</span></div>
      <div class="ci"><input type="color" id="ep-nc" oninput="liveStyle()"/><span>Num</span></div>
    </div>
    <div class="rep"><label>Border width</label><input type="range" min="0" max="6" step="0.5" value="1.5" id="ep-bw" oninput="liveStyle();this.nextElementSibling.textContent=this.value"/><span>1.5</span></div>
    <div class="rep"><label>Font size</label><input type="range" min="9" max="22" value="13" id="ep-fs" oninput="liveStyle();this.nextElementSibling.textContent=this.value"/><span>13</span></div>
  </div>
  <div class="ep-sec">
    <h3>Connector</h3>
    <div class="cgrid">
      <div class="ci"><input type="color" id="ep-lc" value="#aaaaaa" oninput="liveStyle()"/><span>Line</span></div>
    </div>
    <div class="rep"><label>Line style</label>
      <select id="ep-ld" onchange="liveStyle()" style="flex:1;font-size:11px;padding:4px 6px;">
        <option value="none">Solid</option>
        <option value="6 4" selected>Dashed</option>
        <option value="2 4">Dotted</option>
      </select><span></span>
    </div>
  </div>
  <button class="ep-btn primary" onclick="closePanel()">Done</button>
  <button class="ep-btn del" onclick="deleteStation()">Delete Station</button>
</div>

<script>
/* ══ STATE ══ */
var W=0,H=0,nextId=1,activeId=null,shadowOn=false,cardRadius=10,globalFont="'Inter',sans-serif",bgColor='#f0ede8';
var roadCfg={color:'#1e1e1e',dashColor:'#f0a500',width:38,curviness:55,amplitude:80,frequency:3,dashLen:16,dashGap:12,dotSize:13};
var stations=[];
var saveTimer=null;

/* ══ PALETTE ══ */
var PAL=[
  {fill:'#fef3e2',border:'#e8c97a',tc:'#7a4f00',sc:'#a07030',dc:'#c8903a',nc:'#fff',lc:'#d4a450'},
  {fill:'#e8f0fc',border:'#7aa0d4',tc:'#1a3a6e',sc:'#2a5090',dc:'#4a70b0',nc:'#fff',lc:'#6a90c0'},
  {fill:'#eeecfb',border:'#9990d8',tc:'#3a2880',sc:'#5548a8',dc:'#7060c0',nc:'#fff',lc:'#9080d0'},
  {fill:'#fdeaf2',border:'#d878a8',tc:'#7a1848',sc:'#a03068',dc:'#c05090',nc:'#fff',lc:'#d070a8'},
  {fill:'#fdeee8',border:'#d8886a',tc:'#7a2808',sc:'#a04028',dc:'#c05838',nc:'#fff',lc:'#d07050'},
  {fill:'#e4f5ef',border:'#60b890',tc:'#0a5030',sc:'#1a7848',dc:'#30906a',nc:'#fff',lc:'#50a880'},
  {fill:'#eaf4e0',border:'#80c060',tc:'#2a5810',sc:'#3a7820',dc:'#50981e',nc:'#fff',lc:'#70b840'},
];

/* ══ INIT ══ */
window.addEventListener('load',function(){
  resize();
  window.addEventListener('resize',function(){resize();renderRoad();renderConnectors();});
  loadState();
  renderRoad();
  renderAll();
  showSaved();
});

function resize(){
  var wrap=document.getElementById('canvas-wrap');
  W=wrap.offsetWidth;H=wrap.offsetHeight;
  var svg=document.getElementById('rsvg');
  svg.setAttribute('width',W);svg.setAttribute('height',H);
  svg.setAttribute('viewBox','0 0 '+W+' '+H);
  document.getElementById('bg-rect').setAttribute('width',W);
  document.getElementById('bg-rect').setAttribute('height',H);
}

/* ══ STORAGE ══ */
var LS_KEY='roadmap_pro_v2';

function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(function(){
    try{
      var data={
        stations:stations,
        roadCfg:roadCfg,
        cardRadius:cardRadius,
        shadowOn:shadowOn,
        globalFont:globalFont,
        bgColor:bgColor,
        nextId:nextId
      };
      localStorage.setItem(LS_KEY,JSON.stringify(data));
      showSaved();
    }catch(e){}
  },600);
}

function loadState(){
  try{
    var raw=localStorage.getItem(LS_KEY);
    if(!raw){seedOne();return;}
    var data=JSON.parse(raw);
    stations=data.stations||[];
    roadCfg=Object.assign(roadCfg,data.roadCfg||{});
    cardRadius=data.cardRadius||10;
    shadowOn=data.shadowOn||false;
    globalFont=data.globalFont||"'Inter',sans-serif";
    bgColor=data.bgColor||'#f0ede8';
    nextId=data.nextId||stations.length+1;
    if(!stations.length){seedOne();}
    applyLoadedSettings();
  }catch(e){seedOne();}
}

function applyLoadedSettings(){
  document.getElementById('c-road').value=hexify(roadCfg.color);
  document.getElementById('c-dash').value=hexify(roadCfg.dashColor);
  document.getElementById('c-bg').value=hexify(bgColor);
  document.getElementById('canvas-wrap').style.background=bgColor;
  document.getElementById('bg-rect').setAttribute('fill',bgColor);
  document.getElementById('ctrl-font').value=globalFont;
  if(shadowOn){
    document.getElementById('btn-shadow').textContent='On';
    document.getElementById('btn-shadow').classList.add('active');
  }
}

function showSaved(){
  var el=document.getElementById('save-dot');
  el.style.opacity='1';
  setTimeout(function(){el.style.opacity='0';},1800);
}

/* ══ SEED (first run: one station) ══ */
function seedOne(){
  var p=PAL[0];
  stations=[{
    id:nextId++,
    title:'Project Kickoff',
    sub:'Define scope, goals, and\nkey milestones for the project.',
    x:null,y:null, // resolved after first render
    fill:p.fill,border:p.border,tc:p.tc,sc:p.sc,dc:p.dc,nc:p.nc,lc:p.lc,
    borderWidth:1.5,fontSize:13,lineDash:'6 4'
  }];
}

/* ══ ROAD MATH ══ */
function getRoadPath(){
  var steps=300,d='';
  for(var i=0;i<=steps;i++){
    var t=i/steps;
    var x=t*W;
    var y=H/2+Math.sin(t*Math.PI*roadCfg.frequency)*roadCfg.amplitude;
    if(i===0) d='M '+x.toFixed(1)+' '+y.toFixed(1);
    else{
      var pt=((i-1)/steps),px=pt*W,py=H/2+Math.sin(pt*Math.PI*roadCfg.frequency)*roadCfg.amplitude;
      var ctrl=(roadCfg.curviness/100)*((x-px)/2);
      d+=' C '+(px+ctrl).toFixed(1)+' '+py.toFixed(1)+' '+(x-ctrl).toFixed(1)+' '+y.toFixed(1)+' '+x.toFixed(1)+' '+y.toFixed(1);
    }
  }
  return d;
}

function getRoadYAt(frac){
  return H/2+Math.sin(frac*Math.PI*roadCfg.frequency)*roadCfg.amplitude;
}

function renderRoad(){
  if(!W||!H) return;
  var d=getRoadPath();
  var f=document.getElementById('road-fill'),dd=document.getElementById('road-dash');
  f.setAttribute('d',d);f.setAttribute('stroke',roadCfg.color);f.setAttribute('stroke-width',roadCfg.width);
  dd.setAttribute('d',d);dd.setAttribute('stroke',roadCfg.dashColor);
  dd.setAttribute('stroke-width',Math.max(2,roadCfg.width*0.07));
  dd.setAttribute('stroke-dasharray',roadCfg.dashLen+' '+roadCfg.dashGap);
}

/* ══ CONNECTORS & DOTS ══ */
function renderConnectors(){
  var lg=document.getElementById('g-connectors'),dg=document.getElementById('g-dots');
  lg.innerHTML='';dg.innerHTML='';
  var ns='http://www.w3.org/2000/svg';
  stations.forEach(function(s,idx){
    var el=document.getElementById('card-'+s.id);
    if(!el) return;
    var cw=el.offsetWidth||170,ch=el.offsetHeight||80;
    var cx=s.x+cw/2,cy=s.y+ch/2;
    var frac=Math.max(0,Math.min(1,cx/W));
    var ry=getRoadYAt(frac),rx=frac*W;

    var line=document.createElementNS(ns,'line');
    line.setAttribute('x1',cx);line.setAttribute('y1',cy);
    line.setAttribute('x2',rx);line.setAttribute('y2',ry);
    line.setAttribute('stroke',s.lc||'#aaa');line.setAttribute('stroke-width','1.2');
    line.setAttribute('stroke-dasharray',s.lineDash==='none'?'':s.lineDash||'6 4');
    lg.appendChild(line);

    var r=roadCfg.dotSize;
    var c=document.createElementNS(ns,'circle');
    c.setAttribute('cx',rx);c.setAttribute('cy',ry);c.setAttribute('r',r);c.setAttribute('fill',s.dc||'#888');
    dg.appendChild(c);

    var t=document.createElementNS(ns,'text');
    t.setAttribute('x',rx);t.setAttribute('y',ry);t.setAttribute('text-anchor','middle');
    t.setAttribute('dominant-baseline','central');t.setAttribute('font-size',Math.max(9,r*0.85));
    t.setAttribute('font-weight','700');t.setAttribute('fill',s.nc||'#fff');
    t.setAttribute('font-family',globalFont);t.setAttribute('pointer-events','none');
    t.textContent=idx+1;
    dg.appendChild(t);
  });
}

/* ══ CARDS ══ */
function renderAll(){
  document.getElementById('cards-layer').innerHTML='';
  stations.forEach(function(s){
    // assign default position on first render
    if(s.x===null||s.y===null){
      var idx=stations.indexOf(s);
      var frac=0.5;
      s.x=W/2-85;
      s.y=getRoadYAt(frac)-(idx%2===0?140:-40);
    }
    renderCard(s);
  });
  renderConnectors();
}

function renderCard(s){
  var layer=document.getElementById('cards-layer');
  var old=document.getElementById('card-'+s.id);
  if(old) old.remove();

  var div=document.createElement('div');
  div.className='sc';div.id='card-'+s.id;
  div.style.cssText='left:'+s.x+'px;top:'+s.y+'px;background:'+s.fill+';border-color:'+s.border+
    ';border-width:'+(s.borderWidth||1.5)+'px;border-radius:'+cardRadius+'px;font-family:'+globalFont+
    ';box-shadow:'+(shadowOn?'0 6px 24px rgba(0,0,0,.15)':'0 2px 10px rgba(0,0,0,.08)')+';';

  var badge=document.createElement('div');
  badge.className='sc-num';
  badge.style.cssText='background:'+s.dc+';color:'+(s.nc||'#fff')+';';
  badge.textContent=stations.indexOf(s)+1;
  div.appendChild(badge);

  var title=document.createElement('div');
  title.className='sc-title';
  title.style.cssText='color:'+s.tc+';font-size:'+(s.fontSize||13)+'px;';
  title.textContent=s.title;
  div.appendChild(title);

  if(s.sub){
    var sub=document.createElement('div');
    sub.className='sc-sub';
    sub.style.cssText='color:'+s.sc+';font-size:'+Math.max(9,(s.fontSize||13)-2)+'px;';
    sub.textContent=s.sub;
    div.appendChild(sub);
  }

  var btn=document.createElement('button');
  btn.className='sc-edit';btn.title='Edit';btn.textContent='✎';
  btn.addEventListener('click',function(e){e.stopPropagation();openPanel(s.id);});
  div.appendChild(btn);

  makeDraggable(div,s);
  layer.appendChild(div);
}

/* ══ DRAG ══ */
function makeDraggable(el,s){
  var ox=0,oy=0;
  el.addEventListener('mousedown',function(e){
    if(e.target.classList.contains('sc-edit')) return;
    e.preventDefault();
    ox=e.clientX-s.x;oy=e.clientY-s.y;
    el.classList.add('dragging');
    function mv(e){s.x=e.clientX-ox;s.y=e.clientY-oy;el.style.left=s.x+'px';el.style.top=s.y+'px';renderConnectors();}
    function up(){el.classList.remove('dragging');document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);saveState();}
    document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
  });
  el.addEventListener('touchstart',function(e){
    if(e.target.classList.contains('sc-edit')) return;
    e.preventDefault();
    var t=e.touches[0];ox=t.clientX-s.x;oy=t.clientY-s.y;
    el.classList.add('dragging');
    function mv(e){var t=e.touches[0];s.x=t.clientX-ox;s.y=t.clientY-oy;el.style.left=s.x+'px';el.style.top=s.y+'px';renderConnectors();}
    function up(){el.classList.remove('dragging');document.removeEventListener('touchmove',mv);document.removeEventListener('touchend',up);saveState();}
    document.addEventListener('touchmove',mv,{passive:false});document.addEventListener('touchend',up);
  },{passive:false});
}

/* ══ EDIT PANEL ══ */
function openPanel(id){
  activeId=id;
  var s=stations.find(function(x){return x.id===id;});
  if(!s) return;
  document.getElementById('ep-head').textContent='Edit Station '+(stations.indexOf(s)+1);
  document.getElementById('ep-title').value=s.title||'';
  document.getElementById('ep-sub').value=s.sub||'';
  document.getElementById('ep-fill').value=hexify(s.fill);
  document.getElementById('ep-border').value=hexify(s.border);
  document.getElementById('ep-tc').value=hexify(s.tc);
  document.getElementById('ep-sc').value=hexify(s.sc);
  document.getElementById('ep-dc').value=hexify(s.dc);
  document.getElementById('ep-nc').value=hexify(s.nc||'#ffffff');
  document.getElementById('ep-lc').value=hexify(s.lc||'#aaaaaa');
  document.getElementById('ep-bw').value=s.borderWidth||1.5;
  document.getElementById('ep-bw').nextElementSibling.textContent=s.borderWidth||1.5;
  document.getElementById('ep-fs').value=s.fontSize||13;
  document.getElementById('ep-fs').nextElementSibling.textContent=s.fontSize||13;
  document.getElementById('ep-ld').value=s.lineDash||'6 4';
  document.getElementById('ep').classList.add('open');
}

function closePanel(){document.getElementById('ep').classList.remove('open');activeId=null;}

function liveUpdate(){
  if(!activeId) return;
  var s=stations.find(function(x){return x.id===activeId;});
  if(!s) return;
  s.title=document.getElementById('ep-title').value;
  s.sub=document.getElementById('ep-sub').value;
  renderCard(s);renderConnectors();saveState();
}

function liveStyle(){
  if(!activeId) return;
  var s=stations.find(function(x){return x.id===activeId;});
  if(!s) return;
  s.fill=document.getElementById('ep-fill').value;
  s.border=document.getElementById('ep-border').value;
  s.tc=document.getElementById('ep-tc').value;
  s.sc=document.getElementById('ep-sc').value;
  s.dc=document.getElementById('ep-dc').value;
  s.nc=document.getElementById('ep-nc').value;
  s.lc=document.getElementById('ep-lc').value;
  s.borderWidth=parseFloat(document.getElementById('ep-bw').value);
  s.fontSize=parseInt(document.getElementById('ep-fs').value);
  s.lineDash=document.getElementById('ep-ld').value;
  renderCard(s);renderConnectors();saveState();
}

function deleteStation(){
  if(!activeId) return;
  stations=stations.filter(function(x){return x.id!==activeId;});
  var el=document.getElementById('card-'+activeId);if(el)el.remove();
  closePanel();renderAll();saveState();
}

/* ══ ADD STATION ══ */
function addStation(){
  var p=PAL[stations.length%PAL.length];
  var s={
    id:nextId++,title:'New Station',sub:'Add your description here.',
    x:W/2-85,y:H/2-140,
    fill:p.fill,border:p.border,tc:p.tc,sc:p.sc,dc:p.dc,nc:p.nc,lc:p.lc,
    borderWidth:1.5,fontSize:13,lineDash:'6 4'
  };
  stations.push(s);renderCard(s);renderConnectors();openPanel(s.id);saveState();
}

function toggleShadow(btn){

}
function setGlobalFont(v){globalFont=v;document.querySelectorAll('.sc').forEach(function(el){el.style.fontFamily=v;});renderConnectors();saveState();}
function setBg(v){bgColor=v;document.getElementById('canvas-wrap').style.background=v;document.getElementById('bg-rect').setAttribute('fill',v);saveState();}
function clearAll(){if(!confirm('Reset everything? This cannot be undone.')) return;localStorage.removeItem(LS_KEY);location.reload();}

/* ══ EXPORT PNG ══ */
function exportPNG(){
  // Step 1: clone the SVG road layer
  var svg=document.getElementById('rsvg');
  var svgClone=svg.cloneNode(true);
  svgClone.setAttribute('width',W);svgClone.setAttribute('height',H);
  svgClone.setAttribute('xmlns','http://www.w3.org/2000/svg');

  // Step 2: build card SVG elements to embed
  var ns='http://www.w3.org/2000/svg';
  stations.forEach(function(s,idx){
    var el=document.getElementById('card-'+s.id);
    if(!el) return;
    var cw=el.offsetWidth,ch=el.offsetHeight;
    var g=document.createElementNS(ns,'g');

    // card rect
    var rect=document.createElementNS(ns,'rect');
    rect.setAttribute('x',s.x);rect.setAttribute('y',s.y);
    rect.setAttribute('width',cw);rect.setAttribute('height',ch);
    rect.setAttribute('rx',cardRadius);rect.setAttribute('fill',s.fill);
    rect.setAttribute('stroke',s.border);rect.setAttribute('stroke-width',s.borderWidth||1.5);
    if(shadowOn) rect.setAttribute('filter','url(#dshadow)');
    g.appendChild(rect);

    // badge circle
    var r=12;var bx=s.x+r+10,by=s.y+r+10;
    var circ=document.createElementNS(ns,'circle');
    circ.setAttribute('cx',bx);circ.setAttribute('cy',by);circ.setAttribute('r',r);
    circ.setAttribute('fill',s.dc);g.appendChild(circ);
    var nt=document.createElementNS(ns,'text');
    nt.setAttribute('x',bx);nt.setAttribute('y',by);nt.setAttribute('text-anchor','middle');
    nt.setAttribute('dominant-baseline','central');nt.setAttribute('font-size','11');
    nt.setAttribute('font-weight','700');nt.setAttribute('fill',s.nc||'#fff');
    nt.setAttribute('font-family',globalFont);nt.textContent=idx+1;g.appendChild(nt);

    // title
    var fs=s.fontSize||13;
    var tx=s.x+14,ty=s.y+10+r*2+8;
    var lines=(s.title||'').match(/.{1,28}/g)||[''];
    lines.forEach(function(line,li){
      var tt=document.createElementNS(ns,'text');
      tt.setAttribute('x',tx);tt.setAttribute('y',ty+li*(fs+4));
      tt.setAttribute('font-size',fs);tt.setAttribute('font-weight','600');
      tt.setAttribute('fill',s.tc);tt.setAttribute('font-family',globalFont);
      tt.textContent=line;g.appendChild(tt);
    });

    // sub
    var sy=ty+lines.length*(fs+4)+4;
    var sfs=Math.max(9,fs-2);
    (s.sub||'').split('\n').forEach(function(line,li){
      var st=document.createElementNS(ns,'text');
      st.setAttribute('x',tx);st.setAttribute('y',sy+li*(sfs+3));
      st.setAttribute('font-size',sfs);st.setAttribute('fill',s.sc);
      st.setAttribute('font-family',globalFont);st.setAttribute('opacity','0.78');
      st.textContent=line;g.appendChild(st);
    });

    svgClone.appendChild(g);
  });

  // Step 3: serialize and draw to canvas
  var xml='<?xml version="1.0" encoding="UTF-8"?>'+new XMLSerializer().serializeToString(svgClone);
  var blob=new Blob([xml],{type:'image/svg+xml;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var img=new Image();
  img.onload=function(){
    var canvas=document.createElement('canvas');
    canvas.width=W*2;canvas.height=H*2;
    var ctx=canvas.getContext('2d');
    ctx.scale(2,2);
    ctx.fillStyle=bgColor;ctx.fillRect(0,0,W,H);
    ctx.drawImage(img,0,0);
    canvas.toBlob(function(b){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(b);a.download='roadmap.png';a.click();
      URL.revokeObjectURL(url);
    },'image/png');
  };
  img.onerror=function(){alert('PNG export failed. Try a different browser.');URL.revokeObjectURL(url);};
  img.src=url;
}

/* ══ UTILS ══ */
function hexify(str){
  if(!str) return '#888888';
  if(str[0]==='#') return str.length>=7?str.slice(0,7):'#888888';
  var m=str.match(/\d+/g);
  if(!m||m.length<3) return '#888888';
  return '#'+m.slice(0,3).map(function(x){return ('0'+parseInt(x).toString(16)).slice(-2);}).join('');
}
